services:
  - type: web
    name: samridhi-properties-backend
    runtime: node
    rootDir: samridhi-properties/backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ADMIN_PASSWORD
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
